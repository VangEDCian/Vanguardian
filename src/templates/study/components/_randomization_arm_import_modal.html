{% load i18n static %}
<div class="modal-backdrop"
     id="modal-import-randomization-arms"
     role="dialog"
     aria-modal="true"
     aria-labelledby="modal-import-randomization-arms-title">
    <div class="modal modal--info modal--randomization-import">
        <form method="post"
              enctype="multipart/form-data"
              action="{{ randomization_arm_commit_url }}"
              data-randomization-import-form>
            {% csrf_token %}
            <div class="modal__header modal__header--left">
                <div class="modal__icon" aria-hidden="true">i</div>
                <h2 class="modal__title" id="modal-import-randomization-arms-title">{% trans "Import Randomization Arms" %}</h2>
            </div>
            <div class="modal__body modal__body--left modal__body--scrollable">
                <div class="randomization-import-form">
                    <div class="randomization-import-form__field">
                        <label for="randomization-arm-import-file"
                               class="randomization-import-form__label">{% trans "Import File" %}</label>
                        <input type="file"
                               id="randomization-arm-import-file"
                               name="import_file"
                               accept=".xlsx,.xls,.csv"
                               required
                               data-randomization-import-input
                               data-import-kind="arm"
                               data-preview-url="{{ randomization_arm_preview_url }}"
                               data-commit-url="{{ randomization_arm_commit_url }}"
                               data-preview-title="{% trans 'Randomization Arm Preview' %}">
                        <p class="randomization-import-form__help">{% trans "Accepted formats: .xlsx, .xls, .csv" %}</p>
                        <p class="randomization-import-form__help">
                            {% trans "Use the arms template to define scheme code, arm code, target count, display order, active flag, and notes." %}
                        </p>
                        <a href="{% static 'study/templates/randomization_arms_template.xlsx' %}"
                           class="randomization-import-form__template-link"
                           download>{% trans "Download Template" %}</a>
                    </div>
                </div>
            </div>
            <div class="modal__footer modal__footer--end">
                <button type="button"
                        class="modal__cancel"
                        data-modal-close="modal-import-randomization-arms">{% trans "Cancel" %}</button>
                <button type="submit"
                        class="entity-table__footer-button entity-table__footer-button--primary">
                    {% trans "Import File" %}
                </button>
            </div>
        </form>
    </div>
</div>
