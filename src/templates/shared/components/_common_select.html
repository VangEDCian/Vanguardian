{% if select_mode == "native" %}
<div class="common-select common-select--native{% if select_wrapper_class %} {{ select_wrapper_class }}{% endif %}">
  <select
    {% if select_id %}id="{{ select_id }}"{% endif %}
    {% if select_name %}name="{{ select_name }}"{% endif %}
    class="common-select__native{% if select_control_class %} {{ select_control_class }}{% endif %}"
    {% if select_aria_label %}aria-label="{{ select_aria_label }}"{% endif %}
    {% if select_auto_submit %}onchange="this.form.submit()"{% endif %}
  >
    {% for option in select_options %}
      <option value="{{ option.value }}"{% if option.selected or option.value == select_value %} selected{% endif %}>{{ option.label }}</option>
    {% endfor %}
  </select>
</div>
{% else %}
<div class="common-select{% if select_wrapper_class %} {{ select_wrapper_class }}{% endif %}" data-dropdown>
  <button
    {% if select_id %}id="{{ select_id }}"{% endif %}
    type="button"
    class="common-select__trigger{% if select_trigger_class %} {{ select_trigger_class }}{% endif %}"
    data-dropdown-trigger
    aria-expanded="false"
    {% if select_aria_label %}aria-label="{{ select_aria_label }}"{% endif %}
  >
    <span data-dropdown-value>{{ select_display_text }}</span>
    <span aria-hidden="true">▾</span>
  </button>
  <div class="common-select__menu{% if select_menu_class %} {{ select_menu_class }}{% endif %}" data-dropdown-menu hidden>
    {% for option in select_options %}
      <button
        type="{% if select_name %}submit{% else %}button{% endif %}"
        {% if select_name %}name="{{ select_name }}"{% endif %}
        value="{{ option.value }}"
        data-dropdown-option
      >{{ option.label }}</button>
    {% endfor %}
  </div>
</div>
{% endif %}
