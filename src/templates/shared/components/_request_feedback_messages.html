{% if messages %}
    <div class="request-feedback" role="status" aria-live="polite">
        {% for message in messages %}
            <p class="request-feedback__message
                      {% if message.level == DEFAULT_MESSAGE_LEVELS.SUCCESS %}
                          request-feedback__message--success
                      {% elif message.level == DEFAULT_MESSAGE_LEVELS.ERROR %}
                          request-feedback__message--error
                      {% elif message.level == DEFAULT_MESSAGE_LEVELS.WARNING %}
                          request-feedback__message--warning
                      {% else %}
                          request-feedback__message--info
                      {% endif %}">
                {{ message }}
            </p>
        {% endfor %}
    </div>
{% endif %}
