{% load i18n static %}
{% url 'subject:subject_detail' study_id=record.study_id subject_id=record.pk as subject_detail_base_url %}
<div class="crf-template-actions" data-dropdown>
    <button type="button"
            class="crf-template-actions__trigger"
            data-dropdown-trigger
            aria-expanded="false"
            aria-label="{% trans 'Open actions menu' %}">
        <span class="crf-template-actions__value" data-dropdown-value>{% trans "Actions" %}</span>
        <span class="svg-icon crf-template-actions__icon"
              aria-hidden="true"
              style="--icon-url: url('{% static 'images/table/ellipsis-vertical-svgrepo-com.svg' %}')"></span>
    </button>
    <div class="crf-template-actions__menu" data-dropdown-menu hidden>
        <a href="{{ subject_detail_base_url }}?mode=viewonly"
           class="crf-template-actions__item"
           data-dropdown-option>{% trans "View Detail" %}</a>
        {% if record.pk in table.verify_eligible_subject_ids %}
            <button type="button"
                    class="crf-template-actions__item"
                    data-subject-verify-form-nav="{{ subject_detail_base_url }}?mode=verification">
                {% trans "Verify Form" %}
            </button>
        {% else %}
            <button type="button"
                    class="crf-template-actions__item"
                    disabled
                    aria-disabled="true"
                    data-dropdown-option
                    title="{% trans 'You do not have permission or you last submitted data for this subject.' %}">
                {% trans "Verify Form" %}
            </button>
        {% endif %}
    </div>
</div>
