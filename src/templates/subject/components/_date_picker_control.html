{% load shared_layout %}
{% subject_date_picker_i18n as date_picker_i18n %}
<div class="subject-date-picker">
    <div class="subject-date-picker__part">
        <span class="subject-date-picker__label">{{ date_picker_i18n.day_label }}</span>
        <input class="subject-date-picker__input subject-date-picker__input--day"
               type="text"
               inputmode="numeric"
               pattern="^(?:[1-9]|[12][0-9]|3[01])$"
               maxlength="2"
               oninput="this.value=this.value.replace(/\D/g,'').slice(0,2);if(this.value){var day=parseInt(this.value,10);if(day<1){this.value='1';}else if(day>31){this.value='31';}}"
               placeholder="{{ date_picker_i18n.day_placeholder }}"
               value="">
    </div>
    <div class="subject-date-picker__part">
        <span class="subject-date-picker__label">{{ date_picker_i18n.month_label }}</span>
        <select class="subject-date-picker__input subject-date-picker__input--month">
            <option value="">{{ date_picker_i18n.month_empty_option }}</option>
            {% for month in date_picker_i18n.months %}
                <option value="{{ month.value }}">{{ month.label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="subject-date-picker__part">
        <span class="subject-date-picker__label">{{ date_picker_i18n.year_label }}</span>
        <input class="subject-date-picker__input subject-date-picker__input--year"
               type="text"
               inputmode="numeric"
               pattern="^\d{4}$"
               maxlength="4"
               oninput="this.value=this.value.replace(/\D/g,'').slice(0,4);"
               placeholder="{{ date_picker_i18n.year_placeholder }}"
               value="">
    </div>
</div>
