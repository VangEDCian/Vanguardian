<div class="flex flex-wrap items-end gap-2.5">
    <div class="flex flex-col items-center gap-1">
        <span class="text-xs leading-none text-gray-500">Day</span>
        <input class="h-[29.5px] w-14 rounded border border-zinc-300 px-2 py-1 text-center text-sm outline-none focus:border-sky-400"
               placeholder="DD"
               value="">
    </div>
    <div class="flex flex-col items-center gap-1">
        <span class="text-xs leading-none text-gray-500">Month</span>
        <select class="h-[29px] w-24 rounded border border-zinc-300 px-1 py-1 text-sm outline-none focus:border-sky-400">
            <option value="">--</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>
    </div>
    <div class="flex flex-col items-center gap-1">
        <span class="text-xs leading-none text-gray-500">Year</span>
        <input class="h-[29.5px] w-20 rounded border border-zinc-300 px-2 py-1 text-center text-sm outline-none focus:border-sky-400"
               placeholder="YYYY"
               value="">
    </div>
</div>
