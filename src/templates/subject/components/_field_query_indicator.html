{% load i18n static %}
{% if field.active_query_id %}
    <button type="button"
            class="subject-form-query-indicator"
            data-query-thread-modal-trigger
            data-active-query-id="{{ field.active_query_id }}"
            data-field-template-id="{{ field.id|default:'' }}"
            data-field-label="{{ field.label|escape }}"
            data-field-key="{{ field.field_key|escape }}"
            data-field-value="{{ field.display_value|default:field.value|default:'—'|escape }}"
            data-query-status="{{ field.active_query_status|default:''|escape }}"
            data-query-answered="{% if field.active_query_is_answered %}true{% else %}false{% endif %}"
            data-query-can-respond="true"
            title="{% trans 'Current Query' %}"
            aria-label="{% trans 'Current Query' %}">
        <span class="svg-icon"
              aria-hidden="true"
              style="--icon-url: url('{% static 'images/datacapture/message.svg' %}')"></span>
        <span class="subject-form-query-indicator__sr-only">{% trans "Current Query" %}</span>
        {% if field.query_thread_badge_count %}
            <span class="subject-form-verification-review__query-badge"
                  data-query-thread-badge>{{ field.query_thread_badge_count }}</span>
        {% endif %}
    </button>
    <span hidden data-query-message-source>
        {% for message in field.query_messages %}
            <span data-query-message
                  data-message-dataquery-id="{{ message.dataquery_id|default:'' }}"
                  data-message-text="{{ message.text|escape }}"
                  data-message-status="{{ message.status|escape }}"
                  data-message-opened-by="{{ message.opened_by|escape }}"
                  data-message-opened-at="{{ message.opened_at|escape }}"></span>
        {% endfor %}
    </span>
{% endif %}
{% if field.validation_issue_count %}
    <button type="button"
            class="subject-form-query-indicator"
            data-validation-issue-modal-trigger
            data-field-template-id="{{ field.id|default:'' }}"
            data-field-label="{{ field.label|escape }}"
            data-field-key="{{ field.field_key|escape }}"
            data-field-value="{{ field.display_value|default:field.value|default:'—'|escape }}"
            title="{% trans 'Validation Issue' %}"
            aria-label="{% trans 'Validation Issue' %}">
        <span class="svg-icon"
              aria-hidden="true"
              style="--icon-url: url('{% static 'images/datacapture/warning.svg' %}')"></span>
        <span class="subject-form-query-indicator__sr-only">{% trans "Validation Issue" %}</span>
        <span class="subject-form-verification-review__query-badge"
              data-validation-issue-badge>{{ field.validation_issue_count }}</span>
    </button>
    <span hidden data-validation-issue-source>
        {% for issue in field.validation_issues %}
            <span data-validation-issue
                  data-issue-id="{{ issue.id|default:'' }}"
                  data-issue-rule-id="{{ issue.rule_id|default:'' }}"
                  data-issue-message="{{ issue.message|escape }}"
                  data-issue-mode="{{ issue.mode|escape }}"
                  data-issue-severity="{{ issue.severity|escape }}"
                  data-issue-status="{{ issue.status|escape }}"
                  data-issue-created-at="{{ issue.created_at|escape }}"></span>
        {% endfor %}
    </span>
{% endif %}
