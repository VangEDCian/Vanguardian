{% load subject_form_tags subject_field_validators %}
{% subject_datetime_text_control_i18n as datetime_text_i18n %}
{% subject_date_validator_attrs field as datetime_text_validator_attrs %}
<div class="subject-date-text{% if field.classes %} {{ field.classes }}{% endif %}"{% if field.style %} style="{{ field.style }}"{% endif %}>
    <input type="hidden"
           data-date-text-composite-input
           data-date-text-kind="datetime"
           tabindex="{% subject_control_tabindex field 0 %}"
           value="{{ field.value|default:'' }}">
    <input class="subject-date-text__input"
           type="text"
           tabindex="{% subject_control_tabindex field 1 %}"
           inputmode="numeric"
           data-date-text-input
           data-date-text-kind="datetime"
           data-date-text-locale="{{ datetime_text_i18n.locale }}"
           pattern="{{ datetime_text_i18n.pattern }}"
           maxlength="16"
           {% if is_page_edit_locked %}disabled aria-disabled="true"{% endif %}
           {{ datetime_text_validator_attrs }}
           placeholder="{{ datetime_text_i18n.placeholder }}"
           value="{% if datetime_text_i18n.locale == "vi" %}{% if field.date_day %}{{ field.date_day }}{% if field.date_month %}/{{ field.date_month }}{% if field.date_year %}/{{ field.date_year }}{% if field.date_time %} {{ field.date_time }}{% endif %}{% endif %}{% endif %}{% endif %}{% else %}{% if field.date_month %}{{ field.date_month }}{% if field.date_day %}/{{ field.date_day }}{% if field.date_year %}/{{ field.date_year }}{% if field.date_time %} {{ field.date_time }}{% endif %}{% endif %}{% endif %}{% endif %}{% endif %}"
           aria-label="{{ field.label|default:field.field_key|default:datetime_text_i18n.label }}">
</div>
