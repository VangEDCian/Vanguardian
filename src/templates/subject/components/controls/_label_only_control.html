{% load subject_form_tags %}
{% subject_label_only_control_i18n as label_only_control_i18n %}
{% subject_control_tabindex field 0 as control_tabindex %}
<input class="{{ readonly_input_class|default:input_class }}{% if field.classes %} {{ field.classes }}{% endif %}"
       type="text"
       tabindex="{{ control_tabindex }}"
       data-submitted-diff-control="label-only"
       {% if field.style %}style="{{ field.style }}"{% endif %}
       readonly
       {% if is_page_edit_locked %}disabled aria-disabled="true"{% endif %}
       value="{{ field.value }}"
       placeholder="{{ field.placeholder_text|default:label_only_control_i18n.placeholder }}" />
