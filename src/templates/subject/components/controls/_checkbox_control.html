{% load subject_form_tags %}
{% subject_checkbox_control_i18n as checkbox_control_i18n %}
<div class="{{ choice_list_class }}{% if field.classes %} {{ field.classes }}{% endif %}"
     data-submitted-diff-control="checkbox"
     {% if field.style %}style="{{ field.style }}"{% endif %}>
    <label>
        <input type="checkbox" disabled {% if field.is_checked %}checked{% endif %} />
        {% if field.options and field.options.0 %}
            {{ field.options.0.label|default:field.label }}
        {% else %}
            {{ field.label|default:checkbox_control_i18n.default_label }}
        {% endif %}
    </label>
</div>
