name: Main Source Branch Policy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  validate_source_branch:
    name: main-source-branch-policy
    runs-on: ubuntu-latest
    steps:
      - name: Allow only release or hotfix branches
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          case "$HEAD_REF" in
            release/*|hotfix/*)
              echo "Allowed source branch: $HEAD_REF"
              ;;
            *)
              echo "Pull requests into main must come from release/** or hotfix/**. Current source branch: $HEAD_REF"
              exit 1
              ;;
          esac
