name: CI

on:
  push:
    branches:
      - dev
      - develop
      - main
      - "release/**"
  pull_request:
    branches:
      - dev
      - develop
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  CACHE_URL: ${{ secrets.CACHE_URL }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    environment: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config default-libmysqlclient-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check manage.py src tests

      - name: Unit test
        run: |
          python manage.py test

  trigger_infrastructure_workflow:
    name: Trigger Infrastructure Workflow
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')

    steps:
      - name: Dispatch Infrastructure workflow
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.INFRASTRUCTURE_WORKFLOW_TOKEN }}
          script: |
            const environment = context.ref.replace('refs/heads/', '');
            const workflowIdFromVar = '${{ vars.INFRASTRUCTURE_WORKFLOW_ID }}'.trim();
            const invalidWorkflowIds = new Set([
              '',
              'workflow_dispatch',
              '/dispatches',
              'actions/workflows/workflow_dispatch/dispatches',
            ]);
            const workflow_id = invalidWorkflowIds.has(workflowIdFromVar)
              ? 'deploy-vanguard-infra.yml'
              : workflowIdFromVar;
            const configuredRef = '${{ vars.INFRASTRUCTURE_WORKFLOW_REF }}'.trim();
            const dispatchRef = workflow_id === 'build-vanguardian-staging-dispatch.yml'
              ? 'develop'
              : (configuredRef || 'main');
            console.log(`Dispatching Infrastructure workflow_id=${workflow_id}, ref=${dispatchRef}, environment=${environment}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: 'VangEDCian',
              repo: 'Infrastructure',
              workflow_id,
              ref: dispatchRef,
              inputs: {
                environment,
              },
              headers: {
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });
